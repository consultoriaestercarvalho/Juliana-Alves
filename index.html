<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Juliana Alves — Fisioterapeuta Especialista em DTM, Bruxismo e Dores Orofaciais • Petrolina • PE">
    <title>Juliana Alves • Fisioterapia Crâniomandibular</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&amp;family=Raleway:wght@300;400;500;600;700&amp;display=swap');
        
        :root {
            --cream: #FAF6F2;
            --cream2: #F2EBE2;
            --cream3: #E8DDD2;
            --terra: #C48A6A;
            --terra-dark: #A86B4A;
            --gold: #D4B89E;
            --gold-dark: #B89070;
            --sage: #9EB5A8;
            --sage-dark: #7A9C8E;
            --espresso: #1A0D07;
            --brown: #3D2315;
            --text: #4A2E1E;
            --muted: #8A7060;
            --white: #FDFAF7;
        }
        
        *,
        *::before,
        *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        img { display: block; max-width: 100%; height: auto; }
        
        .cg { font-family: 'Cormorant Garamond', Georgia, serif !important; }
        .rl { font-family: 'Raleway', system-ui, sans-serif !important; }
        
        /* Animations */
        @keyframes riseUp { from { opacity:0; transform:translateY(28px) } to { opacity:1; transform:translateY(0) } }
        @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
        @keyframes scaleIn { from { opacity:0; transform:scale(.94) } to { opacity:1; transform:scale(1) } }
        
        .s1 { animation: riseUp .65s cubic-bezier(.22,1,.36,1) both; }
        .s2 { animation: riseUp .65s .12s cubic-bezier(.22,1,.36,1) both; }
        .s3 { animation: riseUp .65s .24s cubic-bezier(.22,1,.36,1) both; }
        .s4 { animation: riseUp .65s .36s cubic-bezier(.22,1,.36,1) both; }
        .s5 { animation: riseUp .65s .48s cubic-bezier(.22,1,.36,1) both; }
        .pg { animation: fadeIn .45s ease both; }
        
        /* Buttons */
        .btn-terra {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--terra);
            color: var(--cream);
            border-radius: 100px;
            font-family: 'Raleway', sans-serif;
            font-weight: 500;
            letter-spacing: .06em;
            transition: all .28s cubic-bezier(.22,1,.36,1);
            cursor: pointer;
            border: none;
            text-decoration: none;
            padding: 14px 24px;
            font-size: 14px;
        }
        .btn-terra:hover {
            background: var(--terra-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(196,138,106,.4);
        }
        
        .btn-glass {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(212,184,158,.35);
            color: var(--gold);
            border-radius: 100px;
            font-family: 'Raleway', sans-serif;
            font-weight: 400;
            letter-spacing: .05em;
            backdrop-filter: blur(8px);
            transition: all .28s cubic-bezier(.22,1,.36,1);
            cursor: pointer;
            text-decoration: none;
            padding: 14px 24px;
            font-size: 14px;
        }
        .btn-glass:hover {
            background: rgba(212,184,158,.12);
            border-color: rgba(212,184,158,.7);
            color: var(--cream);
            transform: translateY(-2px);
        }
        
        .btn-ghost {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(212,184,158,.18);
            color: rgba(250,246,242,.65);
            border-radius: 100px;
            font-family: 'Raleway', sans-serif;
            font-weight: 300;
            letter-spacing: .05em;
            transition: all .28s ease;
            cursor: pointer;
            text-decoration: none;
            padding: 13px 24px;
            font-size: 13px;
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,.06);
            border-color: rgba(212,184,158,.35);
            color: var(--cream);
        }
        
        /* Cards */
        .card-hover {
            transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(74,46,30,.12);
        }
        
        /* Gallery */
        .gal-item img {
            transition: transform .5s cubic-bezier(.22,1,.36,1);
        }
        .gal-item:hover img {
            transform: scale(1.06);
        }
        .gal-item .gal-overlay {
            opacity: 0;
            transition: opacity .3s ease;
        }
        .gal-item:hover .gal-overlay {
            opacity: 1;
        }
        
        .orn { color: var(--gold); letter-spacing: .25em; font-size: 11px; }
        .sec-label {
            font-family: 'Raleway', sans-serif;
            font-size: 10px;
            letter-spacing: .35em;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--terra);
        }
        
        /* Responsive tweaks */
        @media (max-width: 640px) {
            .hero-img { width: 190px; height: 260px; }
        }
    </style>
</head>
